<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantity Measurement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__left">
      <!-- <a class="back-btn" href="dashboard.html">← Dashboard</a> -->
      <h1 class="header__title">Welcome To Quantity Measurement</h1>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- CHOOSE TYPE -->
    <section class="section">
      <p class="section__label">CHOOSE TYPE</p>
      <div class="type-grid">
        <button class="type-card active" data-type="length">
          <span class="type-card__icon">📏</span>
          <span class="type-card__name">Length</span>
        </button>
        <button class="type-card" data-type="weight">
          <span class="type-card__icon">⚖️</span>
          <span class="type-card__name">Weight</span>
        </button>
        <button class="type-card" data-type="temperature">
          <span class="type-card__icon">🌡️</span>
          <span class="type-card__name">Temperature</span>
        </button>
        <button class="type-card" data-type="volume">
          <span class="type-card__icon">🧊</span>
          <span class="type-card__name">Volume</span>
        </button>
      </div>
    </section>

    <!-- CHOOSE ACTION -->
    <section class="section">
      <p class="section__label">CHOOSE ACTION</p>
      <div class="action-tabs">
        <button class="action-tab active" data-action="comparison">Comparison</button>
        <button class="action-tab" data-action="conversion">Conversion</button>
        <button class="action-tab" data-action="arithmetic">Arithmetic</button>
      </div>
    </section>

    <!-- COMPARISON PANEL -->
    <section class="panel" id="panel-comparison">
      <div class="two-col">
        <div class="input-group">
          <p class="input-label">FROM</p>
          <input type="number" class="value-input" id="comp-from-val" value="1" />
          <select class="unit-select" id="comp-from-unit"></select>
        </div>
        <div class="input-group">
          <p class="input-label">TO</p>
          <input type="number" class="value-input" id="comp-to-val" readonly />
          <select class="unit-select" id="comp-to-unit"></select>
        </div>
      </div>
    </section>

    <!-- CONVERSION PANEL -->
    <section class="panel hidden" id="panel-conversion">
      <div class="two-col">
        <div class="input-group">
          <p class="input-label">FROM</p>
          <input type="number" class="value-input" id="conv-from-val" value="1" />
          <select class="unit-select" id="conv-from-unit"></select>
        </div>
        <div class="input-group">
          <p class="input-label">TO</p>
          <input type="number" class="value-input" id="conv-to-val" readonly />
          <select class="unit-select" id="conv-to-unit"></select>
        </div>
      </div>
    </section>

    <!-- ARITHMETIC PANEL -->
    <section class="panel hidden" id="panel-arithmetic">
      <div class="arith-row">
        <div class="input-group">
          <p class="input-label">VALUE 1</p>
          <input type="number" class="value-input" id="arith-val1" value="1" />
          <select class="unit-select" id="arith-unit1"></select>
        </div>
        <div class="operator-group">
          <button class="op-btn active" data-op="+">+</button>
          <button class="op-btn" data-op="-">−</button>
          <button class="op-btn" data-op="*">×</button>
          <button class="op-btn" data-op="/">÷</button>
        </div>
        <div class="input-group">
          <p class="input-label">VALUE 2</p>
          <input type="number" class="value-input" id="arith-val2" value="1" />
          <select class="unit-select" id="arith-unit2"></select>
        </div>
      </div>
      <div class="result-box">
        <p class="result-label">RESULT</p>
        <p class="result-value" id="arith-result">—</p>
        <select class="unit-select result-unit" id="arith-result-unit"></select>
      </div>
    </section>

  </main>

  <script src="/js/script.js"></script>
</body>
</html>
