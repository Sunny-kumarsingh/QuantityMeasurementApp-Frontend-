    <!-- Right Auth Panel -->
    <div class="auth-panel">

      <div class="tabs">
        <button class="tab" id="tab-login" onclick="switchTab('login')">LOGIN</button>
        <button class="tab active" id="tab-signup" onclick="switchTab('signup')">SIGNUP</button>
      </div>

      <!-- Login Form -->
      <form class="form hidden" id="form-login" onsubmit="handleLogin(event)" novalidate>
        <div class="field-group">
          <label for="login-email">Email Id</label>
          <input type="email" id="login-email" placeholder="Enter your email"/>
          <span class="err" id="err-login-email"></span>
        </div>
        <div class="field-group">
          <label for="login-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" placeholder="Enter your password"/>
            <button type="button" class="eye-btn" onclick="togglePw('login-password', this)">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="err" id="err-login-password"></span>
        </div>
        <div class="forgot-row">
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <button type="submit" class="submit-btn">Login</button>
        <p class="switch-text">Don't have an account? <span onclick="switchTab('signup')">Signup</span></p>
      </form>

      <!-- Signup Form -->
      <form class="form" id="form-signup" onsubmit="handleSignup(event)" novalidate>
        <div class="field-group">
          <label for="su-name">Full Name</label>
          <input type="text" id="su-name" placeholder="Enter your full name"/>
          <span class="err" id="err-su-name"></span>
        </div>
        <div class="field-group">
          <label for="su-email">Email Id</label>
          <input type="email" id="su-email" placeholder="Enter your email"/>
          <span class="err" id="err-su-email"></span>
        </div>
        <div class="field-group">
          <label for="su-password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="su-password" placeholder="Create a password"/>
            <button type="button" class="eye-btn" onclick="togglePw('su-password', this)">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="err" id="err-su-password"></span>
        </div>
        <div class="field-group">
          <label for="su-mobile">Mobile Number</label>
          <input type="tel" id="su-mobile" placeholder="Enter mobile number" maxlength="10"/>
          <span class="err" id="err-su-mobile"></span>
        </div>
        <button type="submit" class="submit-btn">Signup</button>
        <p class="switch-text">Already have an account? <span onclick="switchTab('login')">Login</span></p>
      </form>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/login.js"></script>
